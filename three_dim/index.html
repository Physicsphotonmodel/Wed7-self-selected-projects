<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智慧頸枕 - 3D 互動終端 (完全修復版)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: #fff; font-family: monospace; }
        #panel {
            position: absolute; top: 20px; left: 20px; width: 280px; z-index: 100;
            background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px;
            border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,255,0,0.15);
        }
        .panel-header { font-size: 16px; color: #4CAF50; margin-bottom: 15px; text-align: center; font-weight: bold;}
        .data-item { margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .control-group { margin-top: 15px; padding-top: 5px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #4CAF50; }
    </style>
</head>
<body>
    <div id="panel">
        <div class="panel-header">智慧頸枕姿態監控</div>
        <div class="data-item" id="rot-display">角度：P 0° | R 0°</div>
        <div class="data-item" id="temp-display">溫度：--°C</div>
        <div class="control-group">
            <div class="slider-label"><span>點頭/抬頭 (Pitch)</span><span id="pitch-val">0°</span></div>
            <input type="range" id="slider-pitch" min="-90" max="90" value="0">
            <div style="height: 15px;"></div>
            <div class="slider-label"><span>左右歪頭 (Roll)</span><span id="roll-val">0°</span></div>
            <input type="range" id="slider-roll" min="-90" max="90" value="0">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="viewer.js"></script>
    <script src="controller.js"></script>
</body>
</html>
